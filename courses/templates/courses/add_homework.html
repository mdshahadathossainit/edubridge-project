{% extends 'base.html' %}
{% block content %}
<style>
    .form-glass {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(20px);
        border-radius: 40px;
        padding: 4rem;
        border: 1px solid rgba(255,255,255,0.4);
    }
    .hw-input {
        background: #f1f5f9 !important;
        border: 2px solid transparent !important;
        border-radius: 15px !important;
        padding: 15px !important;
        transition: all 0.3s;
    }
    .hw-input:focus {
        background: #fff !important;
        border-color: #4f46e5 !important;
        box-shadow: 0 0 0 5px rgba(79, 70, 229, 0.1) !important;
    }
    .btn-assign {
        background: linear-gradient(45deg, #059669, #10b981);
        border: none;
        font-weight: 800;
        letter-spacing: 1px;
    }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="form-glass shadow-2xl">
                <div class="text-center mb-5">
                    <div class="bg-success-subtle d-inline-block p-4 rounded-circle mb-3">
                        <i class="fas fa-file-signature fa-3x text-success"></i>
                    </div>
                    <h2 class="fw-bold text-dark">Create New Homework</h2>
                    <p class="text-secondary">Keep your students engaged with new tasks.</p>
                </div>

                <form method="post" class="needs-validation">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark small text-uppercase ms-1">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small mt-1 ms-1">{{ field.errors }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-assign btn-lg text-white rounded-pill py-3 shadow-lg">
                            ASSIGN TO CLASS <i class="fas fa-paper-plane ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Apply classes to form fields via JS for cleaner template
    document.querySelectorAll('input, select, textarea').forEach(el => {
        el.classList.add('hw-input');
    });
</script>
{% endblock %}
