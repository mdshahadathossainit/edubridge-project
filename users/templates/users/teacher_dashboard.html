{% extends 'base.html' %}
{% block content %}
<style>
    .teacher-header {
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        border-radius: 30px;
        padding: 3rem;
    }
    .stat-card-vibrant {
        border-radius: 25px;
        padding: 2rem;
        color: white;
        transition: transform 0.3s;
        border: none;
    }
    .stat-card-vibrant:hover { transform: scale(1.03); }
    .bg-indigo { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .bg-rose { background: linear-gradient(135deg, #f43f5e, #fb7185); }
    .bg-cyan { background: linear-gradient(135deg, #06b6d4, #22d3ee); }
</style>

<div class="container py-4">
    <div class="teacher-header text-white mb-5 shadow-lg">
        <div class="row align-items-center">
            <div class="col-md-8">
                <h1 class="display-5 fw-bold mb-2">Instructor Dashboard</h1>
                <p class="fs-5 opacity-75 mb-0">Managing {{ total_courses }} active classes and tracking student growth.</p>
            </div>
            <div class="col-md-4 text-md-end mt-4 mt-md-0">
                <a href="{% url 'add_homework' %}" class="btn btn-light btn-lg rounded-pill px-4 fw-bold text-primary shadow">
                    <i class="fas fa-plus-circle me-2"></i>Post HW
                </a>
            </div>
        </div>
    </div>

    <div class="row g-4">
        {% for item in course_data %}
        <div class="col-lg-4 col-md-6">
            <div class="glass-card p-0 overflow-hidden h-100 border-0">
                <div class="p-4 bg-primary-subtle">
                    <h5 class="fw-bold text-primary mb-0">{{ item.course.title }}</h5>
                </div>
                <div class="p-4">
                    <div class="row text-center g-3">
                        <div class="col-6">
                            <div class="p-3 rounded-4 bg-light">
                                <h3 class="fw-bold mb-0 text-dark">{{ item.students }}</h3>
                                <small class="text-muted uppercase fw-bold">Students</small>
                            </div>
                        </div>
                        <div class="col-6">
                            <div class="p-3 rounded-4 bg-light">
                                <h3 class="fw-bold mb-0 text-success"><i class="fas fa-check-circle"></i></h3>
                                <small class="text-muted uppercase fw-bold">Status</small>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 d-grid">
                        <button class="btn btn-outline-primary rounded-pill">Course Analytics</button>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
